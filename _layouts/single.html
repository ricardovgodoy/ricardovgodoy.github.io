---
layout: default
---
<section class="page-header">
  <div class="container">
    {% if page.label %}<div class="section-label">{{ page.label }}</div>{% endif %}
    <h1 class="page-header__title">{{ page.title }}</h1>
    {% if page.description %}<p class="page-header__desc">{{ page.description }}</p>{% endif %}
  </div>
</section>

<section class="page-body page-section" style="padding-top: 0;">
  <div class="container{% if page.narrow %} container--narrow{% endif %}">
    {{ content }}
  </div>
</section>
