---
layout: default
---
<section class="page-header">
  <div class="container container--narrow">
    <div class="section-label">{{ page.date | date: "%B %d, %Y" }}</div>
    <h1 class="page-header__title" style="font-size: clamp(24px, 3vw, 36px);">{{ page.title }}</h1>
  </div>
</section>

<section class="page-section" style="padding-top: 0;">
  <div class="container container--narrow page-body">
    {{ content }}
  </div>
</section>
