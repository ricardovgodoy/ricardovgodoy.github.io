<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.url == '/' %}Ricardo V. Godoy — Robotics Researcher{% elsif page.title %}{{ page.title }} · Ricardo V. Godoy{% else %}Ricardo V. Godoy{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | default: 'Robotics researcher focused on Physical AI, manipulation, and shared control.' }}">
  <meta name="author" content="Ricardo Vilela de Godoy">
  <meta property="og:title" content="{{ page.title | default: site.name }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ site.url }}/images/ricardo-godoy-og.jpg">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.name }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ site.url }}/images/ricardo-godoy-og.jpg">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Ricardo Vilela de Godoy",
    "url": "{{ site.url }}",
    "jobTitle": "Postdoctoral Researcher",
    "affiliation": { "@type": "Organization", "name": "University of São Paulo" },
    "sameAs": [
      "https://scholar.google.com/citations?user=vVXZEB8AAAAJ",
      "https://orcid.org/0000-0002-5323-9299",
      "https://github.com/ricardovgodoy",
      "https://www.linkedin.com/in/ricardo-vilela-de-godoy"
    ]
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/academicons.min.css' | relative_url }}">
  <noscript><style>.fade-in{opacity:1 !important;transform:none !important;}</style></noscript>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  {% if page.head_extra %}{{ page.head_extra }}{% endif %}
  {% feed_meta %}
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="site-wrapper">
    {% include nav.html %}
    <main class="site-content" id="main-content">
      {{ content }}
    </main>
    {% include footer.html %}
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var animated = document.querySelectorAll('.fade-in');
      if ('IntersectionObserver' in window) {
        var observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.08, rootMargin: '0px 0px -24px 0px' });
        animated.forEach(function(el) { observer.observe(el); });
      } else {
        animated.forEach(function(el) { el.classList.add('is-visible'); });
      }

      var toggle = document.querySelector('[data-nav-toggle]');
      var menu = document.getElementById('mobile-navigation');
      function closeMenu() {
        if (!toggle || !menu) return;
        toggle.classList.remove('is-active');
        toggle.setAttribute('aria-expanded', 'false');
        toggle.setAttribute('aria-label', 'Open navigation');
        menu.classList.remove('is-open');
        menu.hidden = true;
        document.body.classList.remove('nav-open');
      }
      if (toggle && menu) {
        toggle.addEventListener('click', function() {
          var open = toggle.getAttribute('aria-expanded') === 'true';
          if (open) return closeMenu();
          toggle.classList.add('is-active');
          toggle.setAttribute('aria-expanded', 'true');
          toggle.setAttribute('aria-label', 'Close navigation');
          menu.classList.add('is-open');
          menu.hidden = false;
          document.body.classList.add('nav-open');
        });
        menu.querySelectorAll('a').forEach(function(link) { link.addEventListener('click', closeMenu); });
        document.addEventListener('keydown', function(event) { if (event.key === 'Escape') closeMenu(); });
      }
    });
  </script>
  {% if page.scripts %}{{ page.scripts }}{% endif %}
</body>
</html>
