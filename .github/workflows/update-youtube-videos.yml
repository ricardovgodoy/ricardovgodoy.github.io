name: Update YouTube videos list

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/update-youtube-videos.yml"
      - "scripts/update_youtube_videos.py"
      - "_data/videos.yml"
  schedule:
    - cron: "0 9 * * *" # daily 09:00 UTC

concurrency:
  group: yt-videos-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update videos
        env:
          YOUTUBE_CHANNEL_URL: "https://www.youtube.com/@RicardoVGodoy"
          YOUTUBE_CHANNEL_ID: "UC1qeevKED2n7lqWOmtbZxYg"
          YOUTUBE_PLAYLIST_IDS: "PL6-MIz5lpF6KsSKMpXc7QyQd1qxA7VCd5"
        run: python scripts/update_youtube_videos.py

      - name: Show git status (debug)
        run: |
          ls -la _data || true
          test -f _data/videos.yml && head -n 30 _data/videos.yml || echo "videos.yml not found"
          git status --porcelain

      - name: Commit updates
        if: github.event_name != 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: ${{ github.ref_name }}
          commit_message: "Update videos list [skip ci]"
          file_pattern: "_data/videos.yml"
