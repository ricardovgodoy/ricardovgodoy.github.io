name: Update Talk Map

on:
  push:
    paths:
      - "_talks/**"
      - "talkmap.ipynb"
      - ".github/workflows/scrape_talks.yml"
  workflow_dispatch:

concurrency:
  group: talk-map-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install jupyter pandas requests beautifulsoup4 geopy python-frontmatter
        python -m pip install --upgrade getorg

    - name: Run Jupyter Notebook
      run: |
        jupyter nbconvert --to notebook --execute talkmap.ipynb --output talkmap_out.ipynb --ExecutePreprocessor.timeout=300

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add talkmap talkmap_out.ipynb
        if git diff --cached --quiet; then
          echo "No changes to commit."
        else
          git commit -m "Update talk map [skip ci]"
          for attempt in 1 2 3; do
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase FETCH_HEAD
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Could not push the generated talk map after 3 attempts."
              exit 1
            fi
          done
        fi
