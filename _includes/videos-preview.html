<section class="page-section" id="videos">
  <div class="container">
    <div class="section-header fade-in">
      <div class="section-label">Videos</div>
      <h2>Recent demos</h2>
      <p>Short clips from recent experiments.</p>
    </div>

    <div class="grid-2">
    {% for v in site.data.videos limit:4 %}
      <a href="https://www.youtube.com/watch?v={{ v.youtube_id }}" target="_blank" rel="noopener" class="video-card fade-in">
        <div class="video-card__thumb">
          <img src="{{ v.thumbnail }}" alt="{{ v.title | escape }}" loading="lazy">
          <div class="video-card__play">▶</div>
          <span class="video-card__year-badge">{{ v.date | slice: 0, 4 }}</span>
        </div>
        <div class="video-card__body">
          <h4 class="video-card__title">{{ v.title | truncatewords: 12 }}</h4>
        </div>
      </a>
    {% endfor %}
    </div>

    <div style="text-align: center; margin-top: 36px;" class="fade-in">
      <a href="{{ '/videos/' | relative_url }}" class="btn btn--outline">All videos →</a>
    </div>
  </div>
</section>
