---
layout: default
title: "News"
permalink: /year-archive/
---

<section class="page-header">
  <div class="container">
    <div class="section-label">Updates</div>
    <h1 class="page-header__title">News</h1>
  </div>
</section>

<section class="page-section" style="padding-top: 0;">
  <div class="container container--narrow">
    {% for post in site.posts %}
    <div class="news-item">
      <div class="news-item__date">{{ post.date | date: "%B %d, %Y" }}</div>
      <div class="news-item__title"><a href="{{ post.url | relative_url }}">{{ post.title }}</a></div>
      <div class="news-item__excerpt">{{ post.excerpt | strip_html | truncatewords: 40 }}</div>
    </div>
    {% endfor %}
  </div>
</section>
